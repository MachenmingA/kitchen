server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://localhost:3306/my_kitchen?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  web:
    resources:
      static-locations: classpath:/static/,file:uploads/

app:
  upload:
    path: uploads
    base-url: http://localhost:8080

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.mykitchen.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: MyKitchenSecretKeyForJWTTokenGeneration2024SecureKey
  expiration: 86400000
  refresh-expiration: 604800000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
